<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cathodic Protection Blog Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #10151f;
      --bg2:     #161d2d;
      --surface: #1c2438;
      --surface2:#243048;
      --border:  #2e3d58;
      --accent:  #4f8ef7;
      --accent2: #6ee7b7;
      --warn:    #f59e0b;
      --danger:  #ef4444;
      --success: #22c55e;
      --text:    #e8edf5;
      --muted:   #7a8aaa;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --rad: 10px;
      --tr: 0.15s ease;
    }
    html, body { height:100%; font-family:var(--font); background:var(--bg); color:var(--text); }

    /* ── 헤더 ── */
    header {
      padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
      background:var(--bg2); border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100;
    }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-icon { width:28px; height:28px; border-radius:7px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:14px; }
    .logo-title { font-size:14px; font-weight:600; }
    .logo-sub { font-size:10px; color:var(--muted); }
    .ctrl { display:flex; gap:6px; flex-wrap:wrap; }

    /* ── 버튼 ── */
    .btn {
      padding:7px 13px; border:none; border-radius:7px; cursor:pointer;
      font-family:var(--font); font-size:12px; font-weight:500;
      display:flex; align-items:center; gap:5px; transition:all var(--tr);
    }
    .btn:disabled { opacity:.35; cursor:not-allowed; }
    .btn-primary { background:#2d65d4; color:#fff; }
    .btn-primary:not(:disabled):hover { background:#3b73e8; }
    .btn-success { background:#166534; color:#bbf7d0; border:1px solid #22c55e44; }
    .btn-success:not(:disabled):hover { background:#15803d; }
    .btn-warn { background:#92400e; color:#fef3c7; border:1px solid #f59e0b44; }
    .btn-warn:not(:disabled):hover { background:#b45309; }
    .btn-danger { background:#7f1d1d; color:#fecaca; border:1px solid #ef444444; }
    .btn-danger:not(:disabled):hover { background:#991b1b; }
    .btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
    .btn-ghost:not(:disabled):hover { background:#2d3b55; }
    /* 기록 초기화 - 눈에 잘 보이게 */
    .btn-reset { background:#7f1d1d; color:#fca5a5; border:1px solid #ef444466; font-weight:600; }
    .btn-reset:not(:disabled):hover { background:#991b1b; }

    /* ── 메인 ── */
    .main { flex:1; padding:16px 20px 0; max-width:1440px; width:100%; margin:0 auto;
      display:flex; flex-direction:column; gap:14px; }

    /* ── 통계 ── */
    .stats { display:flex; gap:8px; flex-wrap:wrap; }
    .stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--rad);
      padding:11px 16px; min-width:100px; }
    .stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .stat-val { font-size:22px; font-weight:700; margin-top:2px; }
    .stat-val.a { color:var(--accent); } .stat-val.s { color:var(--success); }
    .stat-val.w { color:var(--warn); }  .stat-val.sel { color:#fff; }

    /* 실행 배너 */
    .banner { display:none; align-items:center; gap:8px;
      background:#1a2d4a; border:1px solid #2d5088; border-radius:var(--rad);
      padding:9px 14px; font-size:13px; }
    .banner.on { display:flex; }
    .pulse { width:7px; height:7px; border-radius:50%; background:var(--accent);
      animation:pulse 1.2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* 기록 초기화 안내 배너 */
    .hist-warn { display:none; align-items:center; gap:8px;
      background:#3b1919; border:1px solid #ef444466; border-radius:var(--rad);
      padding:9px 14px; font-size:12px; color:#fca5a5; }
    .hist-warn.on { display:flex; }

    /* 선택 툴바 */
    .sel-bar {
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
      background:var(--surface); border:1px solid var(--border); border-radius:var(--rad);
      padding:9px 14px;
    }
    .cb-all-wrap { display:flex; align-items:center; gap:7px; cursor:pointer; }
    .cb-all-wrap label { font-size:13px; cursor:pointer; }
    .sel-info { font-size:12px; color:var(--muted); margin-left:auto; }
    .sel-info strong { color:var(--text); }

    /* ── 필터 탭 ── */
    .sec-hdr { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .sec-title { font-size:13px; font-weight:600; }
    .badge { padding:2px 6px; border-radius:20px; font-size:11px;
      background:var(--surface2); border:1px solid var(--border); }
    .filter-tabs { display:flex; gap:4px; margin-left:auto; }
    .ftab { padding:3px 10px; border-radius:5px; font-size:11px; cursor:pointer;
      border:1px solid var(--border); background:transparent; color:var(--muted);
      font-family:var(--font); transition:all var(--tr); }
    .ftab.on { background:var(--accent); color:#fff; border-color:transparent; }

    /* ── 그룹 ── */
    .g-block { margin-bottom:16px; }
    .g-label { font-size:10px; font-weight:600; color:var(--accent2); text-transform:uppercase;
      letter-spacing:.06em; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
    .g-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── 카드 그리드 ── */
    .i-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:7px; }

    /* ── 아이템 카드 ── */
    .i-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--rad);
      padding:12px; transition:border-color var(--tr), background var(--tr);
    }
    .i-card:hover { border-color:var(--accent); background:var(--surface2); }

    /* 상태별 좌측 테두리 */
    .i-card { border-left:3px solid var(--border); }
    .i-card.published { border-left-color:#22c55e66; }
    .i-card.running   { border-left-color:var(--accent); animation:cpulse 1.5s ease infinite; }
    .i-card.done      { border-left-color:var(--success); }
    .i-card.error     { border-left-color:var(--danger); }
    .i-card.test-card { border-left-color:var(--warn); }
    /* 선택 상태 — 파란 배경 */
    .i-card.selected  { border-color:#4f8ef7; background:#1a2d4a; }
    .i-card.hidden    { display:none; }

    /* published는 opacity 제거하고 배경색으로만 구분 */
    .i-card.published { background:#192c1e; }

    @keyframes cpulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 0 3px rgba(79,142,247,.2)} }

    /* 카드 내부 */
    .c-top  { display:flex; align-items:flex-start; gap:8px; margin-bottom:9px; }

    /* ── 체크박스 (핵심 수정) ── */
    .c-cb {
      width:18px; height:18px; flex-shrink:0; margin-top:2px;
      appearance:none; -webkit-appearance:none;
      border:2px solid #6b82a8;       /* 밝은 회색 테두리 */
      border-radius:4px;
      background:#1c2a40;
      cursor:pointer;
      position:relative;
      transition:all var(--tr);
    }
    .c-cb:hover { border-color:#a0b4d0; background:#253550; }
    .c-cb:checked {
      background:#2d65d4;
      border-color:#4f8ef7;
    }
    .c-cb:checked::after {
      content:'';
      position:absolute;
      left:4px; top:1px;
      width:7px; height:11px;
      border:2px solid #fff;
      border-top:none; border-left:none;
      transform:rotate(45deg);
    }
    .c-cb:disabled { opacity:.4; cursor:not-allowed; }

    .c-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px; background:var(--muted); }
    .c-dot.published { background:var(--success); }
    .c-dot.running { background:var(--accent); animation:pulse 1s infinite; }
    .c-dot.done { background:var(--success); }
    .c-dot.error { background:var(--danger); }
    .c-dot.test { background:var(--warn); }

    .c-title { font-size:11.5px; font-weight:500; line-height:1.5; flex:1;
      color:var(--text); }
    .c-meta { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
    .c-cat  { font-size:9.5px; padding:2px 6px; border-radius:4px;
      background:#1e2d4a; color:#7ab3f7; border:1px solid #2d4a7a; }
    .c-test-badge { font-size:9px; padding:2px 6px; border-radius:4px;
      background:#3b2b0a; color:#fbbf24; border:1px solid #78450d66; }
    .c-pub-badge { font-size:9px; padding:2px 6px; border-radius:4px;
      background:#14311e; color:#4ade80; border:1px solid #166534; }
    .c-actions { display:flex; gap:5px; }

    .btn-xs {
      padding:3px 9px; font-size:10px; border-radius:5px; cursor:pointer;
      border:1px solid var(--border); background:var(--surface2);
      color:var(--text); font-family:var(--font); transition:all var(--tr);
    }
    .btn-xs:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn-xs:disabled { opacity:.35; cursor:not-allowed; }
    .btn-xs.repub { border-color:#166534; color:#4ade80; }
    .btn-xs.repub:hover { background:#166534; border-color:#22c55e; color:#fff; }

    /* ── 로그 스페이서 ── */
    .log-spacer { height:260px; }

    /* ── 로그 터미널 ── */
    .log-wrap { position:sticky; bottom:0;
      background:#0d1118; border-top:1px solid var(--border); z-index:50; }
    .log-hdr { display:flex; align-items:center; justify-content:space-between;
      padding:7px 16px; cursor:pointer; user-select:none; }
    .log-hdr-l { display:flex; align-items:center; gap:7px;
      font-size:12px; font-weight:600; }
    .log-dot { width:6px; height:6px; border-radius:50%; background:#3d4a5e; }
    .log-dot.on { background:var(--accent); animation:pulse 1s infinite; }
    .log-tools { display:flex; gap:4px; }
    .log-body { height:210px; overflow-y:auto; padding:0 16px 10px;
      font-family:var(--mono); font-size:11.5px; line-height:1.65; }
    .log-body.collapsed { display:none; }
    .log-line { display:flex; gap:9px; }
    .log-ts { color:var(--muted); font-size:9.5px; padding-top:2px; flex-shrink:0; white-space:nowrap; }
    .log-msg { white-space:pre-wrap; word-break:break-all; }
    .log-msg.error  { color:#f87171; }
    .log-msg.done   { color:#4ade80; }
    .log-msg.status { color:var(--warn); }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#2e3d58; border-radius:2px; }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-title">Cathodic Protection Dashboard</div>
      <div class="logo-sub">Gemini → Blogger 자동화</div>
    </div>
  </div>
  <div class="ctrl">
    <button class="btn btn-ghost"  id="btnRefresh">🔄 새로고침</button>
    <button class="btn btn-reset"  id="btnHistClear">🗑 기록 초기화</button>
    <button class="btn btn-warn"   id="btnTest">🧪 테스트</button>
    <button class="btn btn-primary" id="btnRunAll">▶ 전체 실행</button>
    <button class="btn btn-danger" id="btnStop" disabled>⛔ 중단</button>
  </div>
</header>

<div class="main">

  <!-- 통계 -->
  <div class="stats">
    <div class="stat"><div class="stat-label">전체</div>    <div class="stat-val a"   id="sTotal">–</div></div>
    <div class="stat"><div class="stat-label">발행 완료</div><div class="stat-val s"   id="sDone">–</div></div>
    <div class="stat"><div class="stat-label">대기 중</div>  <div class="stat-val w"   id="sPending">–</div></div>
    <div class="stat"><div class="stat-label">선택됨</div>   <div class="stat-val sel" id="sSel">0</div></div>
  </div>

  <!-- 실행 배너 -->
  <div class="banner" id="banner">
    <div class="pulse"></div>
    <span id="bannerText">실행 중...</span>
  </div>

  <!-- ⚠️ history 경고 배너 -->
  <div class="hist-warn" id="histWarn">
    ⚠️ &nbsp;이전에 처리된 기록이 있어 일부 아이템이 발행 완료로 표시됩니다.
    실제로 발행되지 않은 경우 <strong style="color:#fff;margin:0 4px;">🗑 기록 초기화</strong> 버튼을 눌러주세요.
  </div>

  <!-- 선택 툴바 -->
  <div class="sel-bar">
    <div class="cb-all-wrap">
      <input type="checkbox" id="cbAll" class="c-cb" style="margin-top:0;" />
      <label for="cbAll" style="font-size:13px;color:var(--text);">전체 선택</label>
    </div>
    <span class="sel-info">
      <strong id="selCount">0</strong>개 선택 /
      전체 <strong id="selTotal">0</strong>개
    </span>
    <button class="btn btn-success" id="btnRunSel"    disabled>▶ 선택 실행</button>
    <button class="btn btn-warn"    id="btnRunSelDry" disabled>🧪 선택 테스트</button>
  </div>

  <!-- 아이템 목록 -->
  <div>
    <div class="sec-hdr">
      <div class="sec-title">📋 아티클 목록</div>
      <span class="badge" id="listCount">0</span>
      <div class="filter-tabs">
        <button class="ftab on" data-filter="all">전체</button>
        <button class="ftab"    data-filter="pending">대기</button>
        <button class="ftab"    data-filter="published">발행됨</button>
      </div>
    </div>
    <div id="articleList" style="margin-top:10px;">
      <p style="color:var(--muted);font-size:13px;">서버 연결 중...</p>
    </div>
  </div>

  <div class="log-spacer"></div>
</div>

<!-- ── 로그 ── -->
<div class="log-wrap">
  <div class="log-hdr" onclick="toggleLog()">
    <div class="log-hdr-l">
      <div class="log-dot" id="logDot"></div>
      <span>진행 로그</span>
      <span style="font-size:10px;color:var(--muted)" id="logCnt">(0줄)</span>
    </div>
    <div class="log-tools">
      <button class="btn-xs" onclick="clearLog(event)">🗑 지우기</button>
      <button class="btn-xs" id="asBtn"  onclick="toggleAS(event)">↓ 자동스크롤 ON</button>
      <button class="btn-xs" id="logToggleBtn">▼ 접기</button>
    </div>
  </div>
  <div class="log-body" id="logBody"></div>
</div>

<script>
// ── 상태 ──────────────────────────────────────────────────────────────────────
let articles = [];
let selected = new Set();
let filter = 'all';
let autoScroll = true;
let logCollapsed = false;
let logLines = 0;
let isRunning = false;
let runtimeStatus = {};
let es = null;

// ── SSE ───────────────────────────────────────────────────────────────────────
function connectSSE() {
  if (es) es.close();
  es = new EventSource('/api/logs/stream');
  es.onmessage = e => onServer(JSON.parse(e.data));
  es.onerror = () => {
    appendLog('error', '서버 연결 끊김. 5초 후 재연결...');
    setTimeout(connectSSE, 5000);
  };
}

function onServer(d) {
  const { type, message, itemId, step, logs } = d;

  if (type === 'history' && Array.isArray(logs)) {
    // 이전 로그 내역 일괄 출력
    logs.forEach(log => {
      onServer(log); // 재귀적으로 처리하여 상태 동기화 및 로그 출력
    });
    return;
  }

  if (message) appendLog(type, message);

  if (type === 'connected') {
    isRunning = d.running || false;
    syncUI(); loadArticles(); return;
  }

  if (type === 'status') {
    if (itemId) {
      if      (step === 'done')        runtimeStatus[itemId] = 'done';
      else if (step === 'error')       runtimeStatus[itemId] = 'error';
      else if (step === 'queue-start') {
        isRunning = true;
        if (logCollapsed) toggleLog(); // 작업 시작 시 로그창 자동 펼침
      }
      else                             runtimeStatus[itemId] = 'running';
    }
  }

  if (type === 'done') {
    isRunning = false; setLogDot(false);
    loadArticles(); syncUI();
  }

  updateCardStatuses(); syncUI();
}

// ── 로그 ─────────────────────────────────────────────────────────────────────
function appendLog(type, msg) {
  const body = document.getElementById('logBody');
  const ts = new Date().toTimeString().slice(0,8);
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-ts">${ts}</span><span class="log-msg ${type}">${escH(msg)}</span>`;
  body.appendChild(line);
  logLines++;
  document.getElementById('logCnt').textContent = `(${logLines}줄)`;
  if (autoScroll) body.scrollTop = body.scrollHeight;
  setLogDot(true);
}
async function clearLog(e) {
  if (e) e.stopPropagation();
  if (isRunning) return; // 실행 중에는 초기화 금지
  await api('/api/logs/clear', {method:'POST'});
  document.getElementById('logBody').innerHTML = '';
  logLines = 0;
  document.getElementById('logCnt').textContent = '(0줄)';
}
function toggleAS(e) {
  if (e) e.stopPropagation();
  autoScroll = !autoScroll;
  document.getElementById('asBtn').textContent = '↓ 자동스크롤 ' + (autoScroll ? 'ON' : 'OFF');
}
function toggleLog() {
  logCollapsed = !logCollapsed;
  document.getElementById('logBody').classList.toggle('collapsed', logCollapsed);
  document.getElementById('logToggleBtn').textContent = logCollapsed ? '▲ 펼치기' : '▼ 접기';
}
function setLogDot(on) { document.getElementById('logDot').classList.toggle('on', on); }

// ── 아이템 로드 ───────────────────────────────────────────────────────────────
async function loadArticles() {
  // 기본적으로 '전체' 또는 '대기' 탭에서는 발행된 항목을 서버에서 필터링함
  const hidePublished = (filter === 'all' || filter === 'pending');
  const data = await api(`/api/articles?hidePublished=${hidePublished}`);
  if (!Array.isArray(data)) return;
  articles = data;
  renderStats();
  renderArticles();
  renderSelInfo();

  // history 경고 배너
  const pubCount = articles.filter(a => !a.isTestItem && a.published).length;
  document.getElementById('histWarn').classList.toggle('on', pubCount > 0);
}

// ── 새로운 아티클 수집 (서버 크롤러 가동) ──
async function fetchNewArticles() {
  if (isRunning) return;
  isRunning = true;
  syncUI();
  document.getElementById('btnRefresh').innerHTML = '⏳ 수집 중...';
  appendLog('log', '🔄 서버에서 새로운 아티클 수집을 시작합니다 (수십 초 소요)...');

  try {
    const r = await api('/api/fetch-new', { method: 'POST' });
    if (r.error) {
      appendLog('error', `수집 실패: ${r.error}`);
    } else {
      appendLog('done', `수집 완료! 새로운 아티클 ${r.count}개를 발견했습니다.`);
      if (r.count === 0) alert('새로운 아티클이 없습니다.');
      articles = r.items;
      renderStats(); renderArticles(); renderSelInfo();
    }
  } catch (e) {
    appendLog('error', `네트워크 오류: ${e.message}`);
  } finally {
    isRunning = false;
    document.getElementById('btnRefresh').innerHTML = '🔄 새로고침';
    syncUI();
  }
}

function renderStats() {
  const nonTest = articles.filter(a => !a.isTestItem);
  const done    = nonTest.filter(a => a.published).length;
  document.getElementById('sTotal').textContent   = nonTest.length;
  document.getElementById('sDone').textContent    = done;
  document.getElementById('sPending').textContent = nonTest.length - done;
  document.getElementById('selTotal').textContent = articles.length;
}

// ── 렌더 ─────────────────────────────────────────────────────────────────────
function getStatus(item) {
  const rt = runtimeStatus[item.id];
  if (rt) return rt;
  if (item.isTestItem) return 'test';
  if (item.published)  return 'published';
  return 'pending';
}

function renderArticles() {
  const filtered = articles.filter(a => {
    if (filter === 'pending')   return !a.published;
    if (filter === 'published') return a.published;
    return true;
  });
  document.getElementById('listCount').textContent = filtered.length;

  const groups = {};
  filtered.forEach(item => {
    if (!groups[item.groupId])
      groups[item.groupId] = { label: item.groupLabel, items: [], isTest: item.isTestItem };
    groups[item.groupId].items.push(item);
  });

  const keys = Object.keys(groups).sort((a,b) =>
    (groups[b].isTest ? 1 : 0) - (groups[a].isTest ? 1 : 0));

  let html = '';
  keys.forEach(gId => {
    const g = groups[gId];
    html += `<div class="g-block">`;
    html += `<div class="g-label">${escH(g.label)}</div>`;
    html += `<div class="i-grid">`;
    g.items.forEach(item => {
      const st    = getStatus(item);
      const isSel = selected.has(item.id);
      const cbDis = isRunning ? 'disabled' : '';
      html += `
        <div class="i-card ${st}${isSel?' selected':''}${item.isTestItem?' test-card':''}"
             id="card-${item.id}">
          <div class="c-top">
            <input type="checkbox" class="c-cb" id="cb-${item.id}" data-id="${item.id}"
              ${isSel ? 'checked' : ''} ${cbDis}
              onchange="toggleSelect('${item.id}',this.checked)" />
            <div class="c-dot ${st}"></div>
            <div class="c-title">${escH(item.title)}</div>
          </div>
          <div class="c-meta">
            <div style="display:flex;gap:4px;flex-wrap:wrap;">
              ${item.isTestItem
                ? `<span class="c-test-badge">🧪 TEST</span>`
                : `<span class="c-cat">${escH(item.category||'')}</span>`}
              ${st === 'published'
                ? `<span class="c-pub-badge">✅ 발행완료</span>`
                : ''}
            </div>
            <div class="c-actions">
              ${st === 'published' && !item.isTestItem
                ? `<button class="btn-xs repub"
                     onclick="rePublish('${item.id}','${escAttr(item.link)}')"
                     ${isRunning?'disabled':''}>↺ 재발행</button>` : ''}
              <button class="btn-xs"
                onclick="runSingle('${item.id}')"
                ${isRunning?'disabled':''}>▶ 실행</button>
              ${item.isTestItem
                ? `<button class="btn-xs"
                     onclick="runSingleDry('${item.id}')"
                     ${isRunning?'disabled':''}>🧪</button>` : ''}
            </div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('articleList').innerHTML = html ||
    '<p style="color:var(--muted);font-size:13px;">표시할 아이템이 없습니다.</p>';
}

function updateCardStatuses() {
  Object.entries(runtimeStatus).forEach(([id, st]) => {
    const card = document.getElementById(`card-${id}`);
    if (!card) return;
    const classes = card.className.replace(/\b(running|done|error|pending|published|test)\b/g,'').trim();
    card.className = classes + ' ' + st;
    const dot = card.querySelector('.c-dot');
    if (dot) dot.className = `c-dot ${st}`;
  });
}

// ── 선택 관리 ─────────────────────────────────────────────────────────────────
function toggleSelect(id, checked) {
  if (checked) selected.add(id);
  else         selected.delete(id);
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.toggle('selected', checked);
  renderSelInfo();
}

function renderSelInfo() {
  const cnt = selected.size;
  document.getElementById('sSel').textContent      = cnt;
  document.getElementById('selCount').textContent  = cnt;
  document.getElementById('btnRunSel').disabled    = isRunning || cnt === 0;
  document.getElementById('btnRunSelDry').disabled = isRunning || cnt === 0;

  const selectable = articles.filter(a => !a.published || a.isTestItem);
  const cbAll = document.getElementById('cbAll');
  if (cbAll) {
    cbAll.indeterminate = cnt > 0 && cnt < selectable.length;
    cbAll.checked       = selectable.length > 0 && cnt >= selectable.length;
  }
}

document.getElementById('cbAll').addEventListener('change', function() {
  const selectable = articles.filter(a => !a.published || a.isTestItem);
  if (this.checked) selectable.forEach(a => selected.add(a.id));
  else              selectable.forEach(a => selected.delete(a.id));
  renderArticles();
  renderSelInfo();
});

// ── 실행 ─────────────────────────────────────────────────────────────────────
async function runSingle(itemId) {
  if (isRunning) return;
  isRunning = true; syncUI();
  runtimeStatus[itemId] = 'running'; updateCardStatuses();
  const r = await api('/api/run/single', jsonPost({itemId}));
  if (r.error) { appendLog('error', r.error); isRunning=false; syncUI(); }
}
async function runSingleDry(itemId) {
  if (isRunning) return;
  isRunning = true; syncUI();
  const r = await api('/api/run/single', jsonPost({itemId, dryRun:true}));
  if (r.error) { appendLog('error', r.error); isRunning=false; syncUI(); }
}
async function runSelected(dryRun=false) {
  if (isRunning || selected.size === 0) return;
  isRunning = true; syncUI();
  const r = await api('/api/run/selected', jsonPost({itemIds:[...selected], dryRun}));
  if (r.error) { appendLog('error', r.error); isRunning=false; syncUI(); }
}
async function runAll() {
  if (isRunning) return;
  isRunning = true; syncUI();
  appendLog('log', '▶ 전체 실행 요청...');
  const r = await api('/api/run/all', {method:'POST'});
  if (r.error) { appendLog('error', r.error); isRunning=false; syncUI(); }
  if (r.message) appendLog('log', r.message);
}
async function runTest() {
  if (isRunning) return;
  isRunning = true; syncUI();
  appendLog('log', '🧪 테스트 실행 (DRY RUN)...');
  const r = await api('/api/run/test', {method:'POST'});
  if (r.error) { appendLog('error', r.error); isRunning=false; syncUI(); }
  if (r.item) appendLog('log', `테스트 대상: ${r.item}`);
}
async function stopAll() {
  if (!isRunning) return;
  appendLog('status', '⛔ 중단 신호 전송...');
  await api('/api/stop', {method:'POST'});
}
async function rePublish(itemId, link) {
  if (isRunning) return;
  if (!confirm('이미 발행된 글을 재발행하시겠습니까?')) return;
  await api('/api/history/clear-item', jsonPost({link}));
  appendLog('log', '↺ 재발행 활성화 완료');
  loadArticles();
}
async function clearHistory() {
  if (!confirm('모든 발행 기록을 초기화하시겠습니까?\n실제 블로그 글은 삭제되지 않습니다.')) return;
  await api('/api/history/clear', {method:'POST'});
  appendLog('log', '🗑 발행 기록 초기화 완료');
  runtimeStatus = {};
  loadArticles();
}

// ── UI 동기화 ─────────────────────────────────────────────────────────────────
function syncUI() {
  const running = isRunning;
  document.getElementById('btnRunAll').disabled    = running;
  document.getElementById('btnTest').disabled      = running;
  document.getElementById('btnRefresh').disabled   = running;
  document.getElementById('btnStop').disabled      = !running;
  document.getElementById('btnRunSel').disabled    = running || selected.size === 0;
  document.getElementById('btnRunSelDry').disabled = running || selected.size === 0;
  document.getElementById('banner').classList.toggle('on', running);
  renderSelInfo();
}

// ── 상태 폴링 ─────────────────────────────────────────────────────────────────
async function pollStatus() {
  const s = await api('/api/status');
  if (!s || s.error) return;
  const prev = isRunning;
  isRunning = s.running;
  if (s.currentItemTitle)
    document.getElementById('bannerText').textContent = `실행 중: ${s.currentItemTitle}`;
  if (prev !== isRunning) {
    syncUI();
    if (!isRunning) loadArticles();
  }
}

// ── 이벤트 ────────────────────────────────────────────────────────────────────
document.querySelectorAll('.ftab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.ftab').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  filter = t.dataset.filter;
  loadArticles(); // 필터 변경 시 서버 재조회
}));
document.getElementById('btnRefresh').addEventListener('click', fetchNewArticles);
document.getElementById('btnHistClear').addEventListener('click', clearHistory);
document.getElementById('btnTest').addEventListener('click', runTest);
document.getElementById('btnRunAll').addEventListener('click', runAll);
document.getElementById('btnStop').addEventListener('click', stopAll);
document.getElementById('btnRunSel').addEventListener('click', () => runSelected(false));
document.getElementById('btnRunSelDry').addEventListener('click', () => runSelected(true));

// ── 유틸 ─────────────────────────────────────────────────────────────────────
const jsonPost = body => ({
  method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
});
const api    = (url, opts={}) => fetch(url, opts).then(r=>r.json()).catch(e=>({error:e.message}));
const escH   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const escAttr = s => String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

// ── 초기화 ────────────────────────────────────────────────────────────────────
connectSSE();
setInterval(pollStatus, 3000);
</script>
</body>
</html>
